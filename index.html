<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>formulaire-html-css</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <form border="1" id="monFormulaire">
            <div>
                <label class="form-group">Nom:</label>
                <input type="text" name="nom" class="form-control" required>
            </div>
            <div>
                <label class="form-group">Prénom:</label>
                <input type="text" name="prenom" class="form-control" required>
            </div>
            <div>
                <label class="">Email</label>
                <input type="email" name="email" class="" required>
            </div>
            <div>
                <label class="">Téléphone</label>
                <input type="tel" name="telephone" class="" required>
            </div>
            <div>
                <label class="">Filière ou domaine</label>
                <select name="filiere" required>
                    <option value="IA & GL">IA & GL</option>
                    <option value="Marketing digital">Marketing digital - e-commerce</option>
                    <option value="Finance">Finance</option>
                    <option value="Management des projets">Management des projets</option>
                    <option value="Ressources humaines">Ressources humaines</option>
                    <option value="Communication">Communication</option>
                    <option value="Design">Design</option>
                    <option value="Informatique">Informatique</option>
                </select>
            </div>
            <div>
                <label class="">Niveau d'etude</label>
                <select name="niveau" required>
                    <option value="license 1">license 1</option>
                    <option value="license 2">license 2</option>
                    <option value="license 3">license 3</option>
                    <option value="master 1">master 1</option>
                    <option value="master 2">master 2</option>
                </select>
            </div>
            <div>
                <textarea name="message" class="form-control" placeholder="Votre message ou motivation..."></textarea>
            </div>
            <div>
                <button type="submit" class="btn btn-primary">Envoyer</button>
                <button type="reset" class="btn btn-secondary">Annuler</button>
            </div>
        </form>

        <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

        <script>
            const GOOGLE_FORM_URL = "https://docs.google.com/forms/u/0/d/e/1FAIpQLSefYgMk1FGQ8LKvdhWyQIwD92pPIUEng770k9Yy5ucWJma-lA/formResponse";

            const ENTRY_IDS = {
                nom: "entry.190019373",
                prenom: "entry.530914863",
                email: "entry.837434948",
                telephone: "entry.968507006",
                filiere: "entry.354472315",
                niveau: "entry.1558434788",
                message: "entry.1334629343"
            };

            const form = document.getElementById("monFormulaire");
            const iframe = document.getElementById("hidden_iframe");
            let envoiEnCours = false;
            let tempGoogleForm = null;

            iframe.addEventListener("load", function () {
                if (envoiEnCours) {
                    alert("Formulaire envoyé avec succès !");
                    form.reset();
                    if (tempGoogleForm && tempGoogleForm.parentNode) {
                        document.body.removeChild(tempGoogleForm);
                    }
                    envoiEnCours = false;
                }
            });

            form.addEventListener("submit", function (e) {
                if (envoiEnCours) return;
                e.preventDefault();
                envoiEnCours = true;

                tempGoogleForm = document.createElement("form");
                tempGoogleForm.action = GOOGLE_FORM_URL;
                tempGoogleForm.method = "POST";
                tempGoogleForm.target = "hidden_iframe";
                tempGoogleForm.style.display = "none";

                const valeurs = {
                    [ENTRY_IDS.nom]: form.nom.value,
                    [ENTRY_IDS.prenom]: form.prenom.value,
                    [ENTRY_IDS.email]: form.email.value,
                    [ENTRY_IDS.telephone]: form.telephone.value,
                    [ENTRY_IDS.filiere]: form.filiere.value,
                    [ENTRY_IDS.niveau]: form.niveau.value,
                    [ENTRY_IDS.message]: form.message.value
                };

                for (const [entryId, valeur] of Object.entries(valeurs)) {
                    const input = document.createElement("input");
                    input.type = "hidden";
                    input.name = entryId;
                    input.value = valeur;
                    tempGoogleForm.appendChild(input);
                }

                document.body.appendChild(tempGoogleForm);
                tempGoogleForm.submit();
            });
        </script>
        
    </body>
</html>
